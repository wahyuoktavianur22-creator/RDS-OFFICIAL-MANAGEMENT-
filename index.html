<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login RD'S Official</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#c40000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
width:90%;
max-width:350px;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#c40000;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#c40000;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
}

</style>

</head>


<body>


<div class="card">

<h2>RD'S Official</h2>


<input 
id="username"
type="text"
placeholder="Email Admin">


<input 
id="password"
type="password"
placeholder="Password">


<button onclick="login()">
LOGIN
</button>


</div>



<script type="module" src="app.js"></script>


</body>

</html>
